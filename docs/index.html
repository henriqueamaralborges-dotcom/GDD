<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra | Estratégia Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Banner de Transição -->
        <div id="turn-banner" class="hidden">
            <h1 id="banner-text">TURNO DA FLORESTA</h1>
        </div>

        <!-- HUD Superior -->
        <header id="hud-top">
            <div class="faction forest" id="stat-forest">
                <div class="icon">🌿</div>
                <div class="data">
                    <span class="name">Floresta</span>
                    <span class="reserve" id="res-forest">0 Tropas</span>
                </div>
            </div>

            <div id="game-status">
                <div id="timer-label">Fase Atual</div>
                <div id="phase-name">RECRUTAMENTO</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="phase-progress"></div>
                </div>
            </div>

            <div class="faction invaders" id="stat-invaders">
                <div class="data text-right">
                    <span class="name">Invasores</span>
                    <span class="reserve" id="res-invaders">0 Tropas</span>
                </div>
                <div class="icon">⚙️</div>
            </div>
        </header>

        <!-- Área do Mapa -->
        <main id="game-view">
            <div id="map-container">
                <svg id="svg-map" viewBox="0 0 1000 850">
                    <g id="layer-links"></g>
                    <g id="layer-nodes"></g>
                </svg>
            </div>

            <!-- Painel de Detalhes -->
            <aside id="info-panel">
                <div id="selection-card" class="glass hidden">
                    <h3 id="sel-name">Amazônia 1</h3>
                    <p id="sel-biome">Bioma: Amazônia</p>
                    <div class="stats">
                        <span>🛡️ <b id="sel-troops">3</b></span>
                        <span id="sel-bonus">Bonus: Mov / 2</span>
                    </div>
                    <button id="btn-action" class="action-btn">Ação</button>
                </div>
                
                <div id="log-box" class="glass">
                    <div id="log-content"></div>
                </div>
            </aside>

            <!-- Botão de Próxima Fase -->
            <button id="btn-next" class="glow-btn">PRÓXIMA FASE</button>
        </main>

        <!-- Modal de Combate -->
        <div id="battle-modal" class="modal hidden">
            <div class="modal-card battle">
                <h2>O ATAQUE COMEÇOU!</h2>
                <div class="battle-grid">
                    <div class="side forest">
                        <div class="units" id="bat-att-units"></div>
                        <div class="dice-set" id="dice-att"></div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="side invaders">
                        <div class="units" id="bat-def-units"></div>
                        <div class="dice-set" id="dice-def"></div>
                    </div>
                </div>
                <div id="battle-msg">Gire os dados!</div>
                <button id="btn-roll" class="modal-btn">Rolar Dados</button>
            </div>
        </div>

        <!-- Modal de Evento -->
        <div id="event-modal" class="modal hidden">
            <div class="modal-card event">
                <h2 id="ev-title">Sorte ou Revés</h2>
                <div id="ev-image">🎁</div>
                <p id="ev-text">Você encontrou um novo recurso!</p>
                <div id="quiz-options" class="hidden"></div>
                <button id="btn-ev-confirm" class="modal-btn">Entendido</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
