<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDD - O Desafio da Floresta vs. Invasores</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Header: Turn & Phase Stats -->
        <header id="game-header">
            <div class="faction-banner forest">
                <span class="faction-name">Floresta</span>
                <span class="faction-resources" id="forest-resources">Recrutas: 0</span>
            </div>
            
            <div id="turn-indicator">
                <h1 id="current-faction">Turno: Floresta</h1>
                <p id="current-phase">Fase: Recrutamento</p>
                <div id="phase-stepper">
                    <span class="step active" data-phase="Recruitment">1</span>
                    <span class="step" data-phase="Movement">2</span>
                    <span class="step" data-phase="Action">3</span>
                    <span class="step" data-phase="Combat">4</span>
                </div>
            </div>

            <div class="faction-banner invaders">
                <span class="faction-name">Invasores</span>
                <span class="faction-resources" id="invader-resources">Recrutas: 0</span>
            </div>
        </header>

        <!-- Main Board Area -->
        <main id="board-area">
            <svg id="game-map" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
                <!-- SVG map content will be generated by JS or defined here -->
                <defs>
                    <filter id="shadow">
                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
                    </filter>
                    <linearGradient id="amazon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g id="territory-connections"></g>
                <g id="territories-layer"></g>
                <g id="stats-layer"></g>
            </svg>

            <!-- Control Panel Overlays -->
            <div id="ui-overlay">
                <button id="scorched-earth-btn" class="primary-btn invader hidden">Extração de Madeira</button>
                <button id="next-phase-btn" class="primary-btn">Avançar Fase</button>
                <div id="action-log"></div>
            </div>
        </main>

        <!-- Dice Tray -->
        <aside id="dice-tray" class="hidden">
            <div class="dice-container">
                <div id="player-dice" class="dice-group"></div>
                <div id="enemy-dice" class="dice-group"></div>
            </div>
            <button id="roll-dice-btn" class="roll-btn">Rolar Dados</button>
        </aside>

        <!-- Modals for Cards, Quiz, Combat -->
        <div id="modal-container" class="modal-backdrop hidden">
            <div class="modal-content">
                <header class="modal-header">
                    <h2 id="modal-title">Evento Especial</h2>
                </header>
                <div id="modal-body"></div>
                <footer class="modal-footer">
                    <button id="modal-close-btn" class="modal-btn">Fechar</button>
                </footer>
            </div>
        </div>
    </div>

    <!-- Script imports -->
    <script src="gameState.js" type="module"></script>
    <script src="mapLogic.js" type="module"></script>
    <script src="combatSystem.js" type="module"></script>
    <script src="cardEvents.js" type="module"></script>
    <script src="main.js" type="module"></script>
</body>
</html>
